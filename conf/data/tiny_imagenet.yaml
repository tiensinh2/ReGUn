name: tiny_imagenet
data_dir: ${paths.data_dir}/tiny-imagenet-200
download: true
batch_size: 128
num_workers: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 4
debug_subset_size: null

transforms:
  normalize:
    mean: [0.4802, 0.4481, 0.3975]
    std:  [0.2770, 0.2691, 0.2821]

  random_crop:
    enabled: true
    size: 64
    padding: 4

  horizontal_flip:
    enabled: true
    p: 0.5

  color_jitter:
    enabled: true
    brightness: 0.1
    contrast: 0.1
    saturation: 0.1
    hue: 0.02

  randaugment:
    enabled: false
    num_ops: 2
    magnitude: 9
    num_magnitude_bins: 31

  random_erasing:
    enabled: false
    p: 0.25
    scale: [0.02, 0.2]
    ratio: [0.3, 3.3]
    value: random

  imagenet_resize:
    enabled: false
    train_size: 224
    eval_resize: 256
    eval_crop: 224
    normalize:
        mean: [0.485, 0.456, 0.406]
        std:  [0.229, 0.224, 0.225]
