name: cifar10
data_dir: ${paths.data_dir}
download: true
batch_size: 128
num_workers: 4
pin_memory: true
persistent_workers: true
prefetch_factor: 2
debug_subset_size: null

transforms:
  normalize:
    mean: [0.4914, 0.4822, 0.4465]
    std:  [0.2470, 0.2435, 0.2616]

  random_crop:
    enabled: true
    size: 32
    padding: 4

  horizontal_flip:
    enabled: true
    p: 0.5

  imagenet_resize:
    enabled: false
    train_size: 224
    eval_resize: 256
    eval_crop: 224
    normalize:
        mean: [0.485, 0.456, 0.406]
        std:  [0.229, 0.224, 0.225]
