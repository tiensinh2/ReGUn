name: neggradp
evaluate_each_epoch: true
sequential: false                # 🔥 joint mode = paper
trainer:
  max_epochs: 10
retain_weight: 0.95              # 🔥 paper w ∈ [0.8, 0.99]
forget_weight: ${eval:1 - ${.retain_weight}}
optim:
  name: sgd
  lr: 0.01                       # medium lr; CIFAR-10 ổn
  momentum: 0.9
  weight_decay: 0.0
  nesterov: false
  betas: [0.9, 0.999]
  exclude_wd_norm_bias: true
scheduler:
  name: none
neggrad:                         # chỉ dùng khi sequential=true (không phải paper)
  epochs: 5
  optim: {name: sgd, lr: 0.01, momentum: 0.9, weight_decay: 0.0, nesterov: false, betas: [0.9, 0.999], exclude_wd_norm_bias: true}
  scheduler: {name: none}
finetune:
  epochs: 5
  optim: {name: sgd, lr: 0.01, momentum: 0.9, weight_decay: 0.0, nesterov: false, betas: [0.9, 0.999], exclude_wd_norm_bias: true}
  scheduler: {name: none}
