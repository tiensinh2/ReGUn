name: regun

evaluate_each_epoch: true

trainer:
  max_epochs: 10

optim:
  name: sgd
  lr: 0.01
  momentum: 0.9           # only used if sgd
  weight_decay: 0.0
  nesterov: false         # only used if sgd
  betas: [0.9, 0.999]     # only used if adamw
  exclude_wd_norm_bias: true  # only used if adamw

scheduler:
  name: none

regun:
  selector: uniform          # uniform | class_informed | feature_1nn
  aggregation: mean_probs    # mean_probs | mean_logits
  fixed_reference: true      # use a frozen copy of the initial model for ReGUn targets
  temperature: 1.0
  retain_weight: 0.5
  forget_weight: ${eval:1 - ${.retain_weight}}
